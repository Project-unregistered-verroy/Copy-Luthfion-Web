<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sewa Trainer - FitMerge</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar-brand">⚡ FitMerge</a>
  <button class="navbar-toggle" onclick="toggleNav()">☰</button>
  <menu class="navbar-menu" id="navbarMenu">
    <a href="dashboard.html">Dashboard</a>
    <a href="workout.html">Workout</a>
    <a href="gizi.html">Gizi</a>
    <a href="mealplan.html">Meal Plan</a>
    <a href="trainer.html">Trainer</a>
    <a href="attendance.html">Absensi</a>
    <a href="payment.html">Pembayaran</a>
    <a href="notifikasi.html">Notifikasi</a>
    <a href="chat.html">Chat</a>
    <a href="profile.html">Profil</a>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </menu>
</nav>

<main>
  <header class="page-header">
    <h1>👥 Sewa Trainer Profesional</h1>
    <p>Pilih personal trainer yang sesuai dengan kebutuhan & spesialisasimu.</p>
  </header>

  <form class="card" onsubmit="event.preventDefault(); renderTrainers();">
    <fieldset>
      <legend>Filter Trainer</legend>
      <section class="form-row">
        <span>
          <label for="trainerSearch">Cari Nama</label>
          <input id="trainerSearch" type="text" placeholder="Ketik nama trainer..." oninput="renderTrainers()">
        </span>
        <span>
          <label for="trainerFilter">Spesialisasi</label>
          <select id="trainerFilter" onchange="renderTrainers()">
            <option value="">Semua</option>
            <option>Weight Loss</option>
            <option>Muscle Building</option>
            <option>Yoga</option>
            <option>Cardio</option>
          </select>
        </span>
      </section>
    </fieldset>
  </form>

  <section id="trainerGrid" class="grid-3"></section>
</main>

<footer>
  <p>&copy; 2026 FitMerge</p>
</footer>

<script src="../js/navbar.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/app.js"></script>
<script>
  requireLogin();
  renderTrainers();
</script>
</body>
</html>
