<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FitMerge</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="../index.html" class="navbar-brand">⚡ FitMerge</a>
  <button class="navbar-toggle" onclick="toggleNav()">☰</button>
  <menu class="navbar-menu" id="navbarMenu">
    <a href="../index.html">Beranda</a>
    <a href="login.html">Login</a>
    <a href="register.html">Daftar</a>
  </menu>
</nav>

<section class="auth-wrap">
  <article class="auth-card">
    <h1>Buat Akun</h1>
    <p class="auth-sub">Daftar gratis sebagai Member</p>

    <form id="regForm" onsubmit="event.preventDefault(); doRegister();">
      <fieldset>
        <legend>Data Akun</legend>

        <label for="regName">Nama Lengkap</label>
        <input id="regName" type="text" placeholder="John Doe" required>

        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" placeholder="anda@contoh.com" required>

        <label for="regUser">Username</label>
        <input id="regUser" type="text" placeholder="johndoe" required>

        <label for="regPass">Password</label>
        <input id="regPass" type="password" placeholder="Minimal 3 karakter" required>
      </fieldset>

      <p id="regError" class="msg msg-error hidden"></p>
      <p id="regSuccess" class="msg msg-success hidden"></p>

      <button type="submit" class="btn-full">Daftar Sekarang</button>
    </form>

    <p style="text-align:center;margin-top:1rem;font-size:0.88rem;color:var(--muted)">
      Sudah punya akun? <a href="login.html"><strong>Masuk</strong></a>
    </p>
  </article>
</section>

<script src="../js/navbar.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
